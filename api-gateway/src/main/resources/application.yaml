server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          # Route 1: all /api/patients/** → Patient service on 8081
          - id: patient-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/patients/**

          # Route 2: all /api/appointments/** → Appointment service on 8082
          - id: appointment-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/appointments/**

management:
  endpoints:
    web:
      exposure:
        include: "*"